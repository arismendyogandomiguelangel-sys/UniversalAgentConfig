name: CI — Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Build
        run: npm run build

      - name: Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Solo en PR a main — Claude audita antes del merge
  audit-reminder:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Recordatorio de auditoría
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  CHECKLIST ANTES DE MERGEAR A MAIN"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "□ Claude Code revisó los cambios críticos?"
          echo "□ Variables de entorno documentadas en .env.example?"
          echo "□ DELIVERY_CHECKLIST.md completado?"
          echo "□ RUNBOOK.md actualizado si cambió algo de infra?"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
